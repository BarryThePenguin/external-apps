---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: mysql-operator
  namespace: cozylab-mysql-operator
spec:
  interval: 5m
  url: https://mysql.github.io/mysql-operator/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mysql-operator
  namespace: cozylab-mysql-operator
spec:
  interval: 5m
  releaseName: mysql-operator
  targetNamespace: cozylab-mysql-operator
  chart:
    spec:
      chart: mysql-operator
      sourceRef:
        kind: HelmRepository
        name: mysql-operator
      version: '2.2.7'
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: minecraft-operator
  namespace: cozylab-minecraft-operator
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/lexfrei/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-operator
  namespace: cozylab-minecraft-operator
spec:
  interval: 5m
  releaseName: minecraft-operator
  targetNamespace: cozylab-minecraft-operator
  chart:
    spec:
      chart: minecraft-operator
      sourceRef:
        kind: HelmRepository
        name: minecraft-operator
      version: '>=1.0.0'
  values:
    crds:
      manage: true
